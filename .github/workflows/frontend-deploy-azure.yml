name: Deploy Frontend (Azure)

on:
  push:
    branches: ["**"]
    paths:
      - "frontend/**"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # main ブランチ → azure-prod 環境、それ以外 → azure-dev 環境
    # 各 GitHub Environment に環境固有のシークレットを設定しておく
    environment: ${{ github.ref_name == 'main' && 'azure-prod' || 'azure-dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        # ビルド + デプロイ + CDN パージを 1 アクションで実行
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
          api_location: ""
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_AZURE }}
