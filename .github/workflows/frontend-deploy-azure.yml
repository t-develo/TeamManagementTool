name: Deploy Frontend (Azure)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"

# SWA deploy アクションは独自のデプロイトークンで認証するため OIDC 不要
# AWS 版（OIDC → aws s3 sync → CloudFront invalidation）と異なり、
# Azure/static-web-apps-deploy@v1 がビルド + デプロイ + CDN パージを 1 アクションで実行する
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          # SWA リソース作成時に発行されるデプロイトークン
          # az staticwebapp secrets list --name <SWAリソース名> --query properties.apiKey -o tsv で取得
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # フロントエンドのソースコードルート
          app_location: "frontend"
          # Vite のビルド出力先
          output_location: "dist"
          # バックエンドは別の Azure Functions で提供するため空にする
          api_location: ""
        env:
          # フロントエンドのビルド時に Azure Functions の URL を渡す
          VITE_API_URL: ${{ secrets.VITE_API_URL_AZURE }}
