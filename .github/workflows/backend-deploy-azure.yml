name: Deploy Backend (Azure)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

# OIDC 認証に必要な権限
# AWS 版と同様に id-token: write が必要
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # requirements-azure.txt を使用（Mangum なし、azure-functions あり）
        run: pip install -r requirements-azure.txt -t ./package
        working-directory: backend

      - name: Copy application code
        # function_app.py と host.json が ZIP ルートに来るようにコピーする
        # app/ ディレクトリも ZIP ルート直下に含める
        run: |
          cp function_app.py ./package/
          cp host.json ./package/
          cp -r app ./package/
        working-directory: backend

      - name: Create deployment ZIP
        # ZIP のルートに function_app.py, host.json, app/ が含まれていることを確認する
        run: cd package && zip -r ../api-azure.zip .
        working-directory: backend

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        # az functionapp deployment source config-zip でデプロイ
        run: |
          az functionapp deployment source config-zip \
            --resource-group teamboard-rg \
            --name ${{ secrets.AZURE_FUNCTIONAPP_NAME }} \
            --src api-azure.zip
        working-directory: backend
