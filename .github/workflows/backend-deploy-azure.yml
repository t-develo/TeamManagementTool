name: Deploy Backend (Azure)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies into package directory
        run: |
          pip install -r requirements-azure.txt -t ./package
          cp -r app ./package/
          cp function_app.py ./package/
          cp host.json ./package/
        working-directory: backend

      - name: Create deployment ZIP
        # function_app.py と host.json が ZIP ルートに来るようにする
        run: cd package && zip -r ../api-azure.zip .
        working-directory: backend

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --name ${{ secrets.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group teamboard-rg \
            --src backend/api-azure.zip
